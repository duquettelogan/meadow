version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: meadow
      POSTGRES_PASSWORD: meadowdev
      POSTGRES_DB: meadow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
